AutoName: Guitar Tuner
Summary: Real-time tuner for guitar, ukulele, and bass
Description: |-
    Guitar Tuner is a lightweight tuner built with Kotlin and Jetpack Compose.
    It listens to microphone input in real time and uses the YIN algorithm to
    detect pitch with a visual cent meter.

    Features:

    * Standard and chromatic tuning modes
    * Presets for guitar, ukulele, and bass
    * Real-time frequency and note display
    * Visual in-tune / sharp / flat feedback
    * Signal smoothing for a more stable reading

